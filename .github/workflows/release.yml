name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Release Zip
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distributable zip
        run: make dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/AgentTrafficLight.zip
